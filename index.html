<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>极简三国杀 · 三人联机</title>

<!-- Firebase (compat build, loaded from Google's CDN). These only run when you DEPLOY this file. -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
  :root{
    --ink:#1a1714; --ink-soft:#2c2722; --paper:#e9e1d2; --paper-dim:#cabfa8;
    --cinnabar:#b1361e; --cinnabar-bright:#d8492c; --gold:#b08d4f;
    --jade:#5f7a5a; --line:rgba(233,225,210,.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #2a2420 0%, var(--ink) 60%),
      var(--ink);
    color:var(--paper);
    font-family:"Songti SC","Noto Serif SC",ui-serif,"STSong",serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    min-height:100%;
  }
  .wrap{max-width:880px;margin:0 auto;padding:18px 16px 40px;}

  h1{
    font-size:30px;letter-spacing:.28em;text-indent:.28em;font-weight:700;
    margin:6px 0 2px;text-align:center;
  }
  h1 .seal{
    display:inline-block;background:var(--cinnabar);color:var(--paper);
    border-radius:6px;padding:0 .18em;margin-right:.25em;
    box-shadow:0 0 0 2px rgba(216,73,44,.35);
  }
  .sub{text-align:center;color:var(--paper-dim);font-size:13px;letter-spacing:.18em;margin-bottom:18px;}

  .panel{
    background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.12));
    border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;
  }

  label{display:block;font-size:12px;letter-spacing:.14em;color:var(--paper-dim);margin:0 0 6px;}
  input{
    width:100%;background:#15120f;border:1px solid var(--line);color:var(--paper);
    border-radius:8px;padding:10px 12px;font-size:15px;font-family:inherit;
  }
  input:focus{outline:none;border-color:var(--gold);}

  button{
    font-family:inherit;cursor:pointer;border-radius:9px;border:1px solid transparent;
    padding:9px 16px;font-size:14px;letter-spacing:.08em;background:#241f1b;color:var(--paper);
    border-color:var(--line);transition:transform .06s ease, background .15s;
  }
  button:hover:not(:disabled){background:#2e2823;}
  button:active:not(:disabled){transform:translateY(1px);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button.primary{background:var(--cinnabar);border-color:var(--cinnabar-bright);}
  /* primary 按钮被 disable 时,仅靠 opacity 淡化朱红看起来还是"暗红"而非"灰"(specificity 打平,
     opacity 和 background 不是同一属性、不会互相覆盖)。这里用更高优先级(.primary:disabled)
     强制换成中性暗色背景,让 disabled 真正显示为灰色/暗淡,不再是变暗的红。 */
  button.primary:disabled{background:#241f1b;border-color:var(--line);}
  button.primary:hover:not(:disabled){background:var(--cinnabar-bright);}
  button.ghost{background:transparent;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .row>div{flex:1;min-width:120px;}

  /* ===== 座位环绕布局(feature/table-ui 第1步:只改定位,不改 seatSlot 语义/renderControls/
     任何动作函数)=====
     容器按"对手数量"(总座位数-1,开局后不随存活人数变化)分两套列模板:
     .opp1(2人局,1个对手)只有居中的 top 一列;.opp2(3人局,2个对手)左右各一列(tl/tr)——
     这部分沿用第2步就定下的分区方式,render.js 的 seatSlot() 逻辑本身不需要跟着改。
     这一步新增的是中间一条不放置任何座位的 "table" 行——对手环绕在上方、"我"固定在
     下方居中,中间用这条空行让出一块视觉上的牌桌空区(下一步中央出牌区/动画会用到这块
     空间,这一步只预留尺寸,不放任何内容)。grid-template-areas 里出现但没有任何元素
     认领的区域名,浏览器仍会按 grid-template-rows 给它保留对应的行高,不需要额外占位元素。
     阵亡不重排:.dead 只变暗/去色,不改变 grid 位置(避免布局跳动打断"有人死了"这条信息的消化)。 */
  .seats{
    display:grid;
    align-items:start;
    justify-items:center;
    gap:14px;
    margin-bottom:6px;
  }
  /* 320px 曾是这里的上限,但排查装备栏换行问题时发现:2人局这一整列(top+me共用同一列)
     会把 .seat.me 也一起卡在320px,比 .seat.me 自己的 max-width:640px 更早触顶——
     column 本身才是真正的瓶颈,640px 那个限制从没机会生效。原始320px在引入时没有留下
     具体理由,这里类比 .seat.me 420→640 那次的算法(.wrap 可用宽度约848px,留足边距):
     直接对齐成640px,让 .seat.me 自己的 max-width 变回真正起作用的那道限制。 */
  .seats.opp1{
    grid-template-columns:minmax(150px,640px);
    grid-template-rows:auto minmax(56px,120px) auto;
    grid-template-areas:"top" "table" "me";
  }
  .seats.opp2{
    grid-template-columns:minmax(120px,1fr) minmax(120px,1fr);
    grid-template-rows:auto minmax(56px,120px) auto;
    grid-template-areas:"tl tr" "table table" "me me";
  }
  /* ===== 座位卡片:头像居左+信息居右(第7步,取代第6步的"头像铺底"方案)=====
     第6步试过"头像铺满卡片上半部分",结果框的宽高比(如桌面638x300≈2.1:1)远比素材本身
     的 3:4 竖版扁得多——object-fit:cover 在这种情况下必然按宽度撑满、纵向大幅裁切,
     算过公式+实测三档截图确认可见比例只有24%~35%,人物永远只剩头顶,身体("露"不出来)
     这不是巧合是必然结果。这次改成头像做成固定小方块居左、信息居右——**头像框比例锁死
     等于素材原始比例 3:4**,不管做多大,object-fit:cover 永远零裁切(等比缩放铺满,宽高
     同步缩放,没有谁"撑爆"谁的问题),从根源避免重蹈裁切的坑,不需要再为响应式各档单独
     调裁切参数。姓名/血量/技能/判定区不再叠在头像上,回到普通文档流,不需要蒙层/绝对定位
     这些第6步专门解决"叠加在图片上"的技巧,复杂度明显下降。 */
  .seat{
    background:#1d1916;border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;position:relative;
    width:100%;
  }
  .seat-body{margin-top:8px;}
  .seat.slot-top{grid-area:top;}
  .seat.slot-tl{grid-area:tl;}
  .seat.slot-tr{grid-area:tr;}
  .seat.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
  .seat.dead{opacity:.45;filter:grayscale(.6);} /* 连头像一起变灰,免费拿到,不用额外处理 */
  .seat.me{
    grid-area:me;
    border-color:var(--cinnabar);
    justify-self:center;
    width:100%;
    max-width:640px; /* 原 420px 在宽屏(1400px+)下明显窄于容器(.wrap 实际可用宽度约848px),放宽利用横向空间 */
    padding:16px 20px;
  }
  .card-top{display:flex;align-items:flex-start;gap:10px;}
  /* 头像框:宽高比精确等于素材 300x400(=3:4),桌面/640px/480px三档 + .seat.me 各一组
     数值,全部保持这个比例——object-fit:cover 在比例吻合时不裁切任何内容,放大缩小
     只影响清晰度不影响构图完整性,不需要为每个断点重新算可见比例。 */
  .avatar-box{position:relative;flex:none;width:90px;height:120px;overflow:hidden;
    border-radius:8px;background:#15120f;}
  .seat.me .avatar-box{width:114px;height:152px;}
  .avatar-box .avatar{width:100%;height:100%;object-fit:cover;display:block;}
  /* 图裂了不会显示浏览器原生的破图标——onerror 触发的是隐藏 <img>、显示这个占位块,不是加载失败的图裂图标 */
  .avatar-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:6px;font-size:11px;color:var(--paper-dim);background:#241f1b;}
  /* 三选一选将阶段:候选卡片纵向堆叠(不是横排3列)——desc完整技能说明文字通常比单纯的
     "技能名"长不少,横排3列会挤得每张卡片都很窄导致文字换行挤压变形,纵向堆叠让每张卡片
     都能占满宽度、有足够空间完整展示说明文字。复用 .avatar-box/.avatar/.avatar-placeholder
     (和座位卡片同一套头像展示逻辑),不重新发明一套。 */
  .general-pick-list{display:flex;flex-direction:column;gap:10px;width:100%;}
  .general-pick-card{display:flex;gap:12px;align-items:flex-start;cursor:pointer;
    background:#1d1916;border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    transition:border-color .15s ease, background .15s ease;}
  .general-pick-card:hover{border-color:var(--gold);background:#241f1b;}
  .general-pick-info{flex:1;min-width:0;}
  .general-pick-name{font-size:15px;font-weight:700;margin-bottom:4px;}
  .general-pick-desc{font-size:13px;color:var(--paper-dim);line-height:1.6;}
  .pick-progress{display:flex;flex-direction:column;gap:4px;font-size:13px;margin-top:6px;}
  .pick-progress-row{padding:2px 0;}
  .info-col{flex:1;min-width:0;} /* min-width:0 让 flex 子项允许收缩/换行,不被内容撑破布局 */
  .top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .nm{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .seat .tag{font-size:10px;letter-spacing:.1em;background:#332b24;color:var(--paper-dim);
    border-radius:4px;padding:1px 6px;}
  .seat .tag.turn{background:var(--gold);color:#1a1410;}
  .hp{font-size:16px;letter-spacing:1px;color:var(--cinnabar-bright);white-space:nowrap;}
  .hp .empty{color:#4a3f37;}
  .skill-line{font-size:11px;color:var(--paper-dim);margin-top:2px;}
  .meta{font-size:12px;color:var(--paper-dim);margin-top:4px;}
  /* 自己的座位卡片信息量最大,额外放大字号/间距,减轻拥挤感——只影响 .me 这张卡片。 */
  .seat.me .nm{font-size:17px;}
  .seat.me .hp{font-size:19px;}
  .seat.me .skill-line{font-size:12.5px;}
  .seat.me .equip-list{font-size:12.5px;gap:5px;}
  .seat.me .meta{font-size:13px;margin-top:6px;}
  /* 装备:逐行列表(图标/文字标签+牌名+射程),纯文字行,已装备的牌名保留金色高亮
     (呼应装备本身的金色主题色)区分于标签文字。对手卡片的空槽整行不渲染(和判定区
     "空的时候不留占位"同一原则),只有 .seat.me 仍然显示全部4槽(含空槽虚线占位),
     因为你会想知道自己缺什么装备——这条决策和头像位置无关,延续第6步的既有结论。 */
  .equip-list{display:flex;flex-direction:column;gap:3px;margin-top:6px;font-size:11px;color:var(--paper-dim);}
  .equip-list .erow b{color:var(--gold);font-weight:700;}
  .equip-list .empty{color:#4a3f37;}
  /* 判定区(延时锦囊):现在是 .info-col 里普通文档流的一行(技能名下方、装备列表上方),
     不再需要绝对定位浮在头像上——紫色描边小 chip 呼应手牌 .card.trick 的锦囊配色,
     和装备的金色系区分开。 */
  .delays{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-top:4px;}
  .dchip{display:inline-flex;align-items:center;gap:3px;border:1px solid #7a5fa0;border-radius:6px;
    padding:2px 6px;color:#c3aee0;background:rgba(122,95,160,.12);white-space:nowrap;}

  /* table center */
  .table{text-align:center;}
  .phase-pill{
    display:inline-block;border:1px solid var(--gold);color:var(--gold);
    border-radius:999px;padding:4px 14px;font-size:13px;letter-spacing:.18em;margin-bottom:8px;
  }
  .deckinfo{font-size:12px;color:var(--paper-dim);margin-bottom:10px;}
  .banner{
    background:rgba(177,54,30,.16);border:1px solid var(--cinnabar);border-radius:10px;
    padding:10px 12px;margin:8px 0;font-size:14px;
  }
  .controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px;}

  /* hand */
  .hand-label{font-size:12px;letter-spacing:.14em;color:var(--paper-dim);margin:14px 0 8px;}
  .hand{display:flex;gap:10px;flex-wrap:wrap;}
  .card{
    width:64px;height:92px;border-radius:10px;background:#f1ead9;color:#1a1410;
    border:1px solid #00000022;position:relative;cursor:pointer;overflow:hidden;
    display:flex;flex-direction:column;
    box-shadow:0 2px 0 rgba(0,0,0,.3);transition:transform .08s;user-select:none;
    --badge:20px; /* 角标(.corner)/问号图标(.info-badge-hit)的统一基准尺寸,以后想
      整体调大调小只改这一处;响应式断点只需要覆盖这一个变量,不用再分别调整多处硬编码
      尺寸(见 CLAUDE.md)。 */
  }
  /* 手牌悬停放大预览(参考炉石传说手牌交互,纯桌面端效果——触屏设备没有hover这个交互
     状态,手机端天然不会触发,不是bug,不需要额外处理)。.card 这个 class 同时被判定区之外
     的场景复用(如郭嘉【遗计】看牌分配弹窗,render.js 里 createElement 直接生成 .card),
     那些场景不适合放大预览,所以只在手牌容器 .hand 内的 .card 上生效,不写成全局 .card:hover。
     transform-origin:bottom center——从底部中心往上放大,而不是整体居中放大,这样卡片
     左右两侧不会因为放大而把相邻手牌顶开位置;z-index 提升到最高,保证放大后盖在
     其它手牌上方而不是被压在下面。
     真机踩过一个坑:iOS Safari 会用"触摸模拟:hover状态"(第一次点触发hover效果,第二次点
     才真正触发click)让不支持hover的触屏设备也能"看到"CSS里写的hover效果——这套效果本来
     就没打算给手机用,结果被意外触发,连带两个问题:①手机上点一张牌变成要点两次才能真正
     打出(第一次点击被hover动画"消耗"掉了,这是此前一直存在但没被明确报告过的隐藏可用性
     问题,根因和下面这条是同一个);②项目里每次游戏状态更新会把整排手牌DOM销毁重建(含
     图片重新加载),放大+阴影动画叠加高频重绘,在iOS上开销叠加导致明显卡顿甚至卡死。
     修复:改用 @media (hover:hover) and (pointer:fine) 限定——hover:hover 要求设备真的
     支持悬停交互,pointer:fine 要求是精确指点设备(鼠标),两者一起用比单独查hover:hover更
     严格,即使某些触屏设备的浏览器错误报告hover:hover也会被pointer:coarse挡住,触屏设备
     完全不会解析到这段规则,自然也不会被"模拟hover"误触发。box-shadow的transition也一并
     移进媒体查询内部,只在真正会用到悬停放大效果的设备上才声明这段动画(基础.card规则只
     保留transform的transition,不支持hover的设备不需要解析这段无用声明)。 */
  .hand .card{ transition:transform .15s ease; transform-origin:bottom center; }
  @media (hover: hover) and (pointer: fine){
    .hand .card:hover{
      transform:translateY(-30px) scale(2.2);
      z-index:50;
      box-shadow:0 12px 24px rgba(0,0,0,.5);
      transition:transform .15s ease, box-shadow .15s ease;
    }
  }
  /* 手机端(触屏设备)长按放大预览:和上面桌面端 hover:hover/pointer:fine 是两条独立的
     交互路径——桌面端靠CSS伪类响应真实悬停,这里靠 render.js 的 attachLongPressPreview
     手动长按500ms后切换这个class来触发同一套视觉效果(数值故意和上面.hover规则完全一致,
     保持两种输入方式看到的放大效果一致)。这条规则不写在上面的 @media 里——它本来就只会
     被touch事件手动触发,不依赖hover/pointer媒体特性,写在媒体查询外面才能在触屏设备上
     生效(如果误放进 hover:hover and pointer:fine 里,反而会在触屏设备上被媒体查询整体
     排除,长按功能会完全失效)。 */
  .card.long-press-preview{
    transform:translateY(-30px) scale(2.2);
    z-index:50;
    box-shadow:0 12px 24px rgba(0,0,0,.5);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  /* ===== 卡片分区版式(顶部标题栏+下方插画区域,更接近实体卡牌观感)=====
     曾经是"图片铺满全卡+.big牌名大字靠no-art控制显示/隐藏"这版,现在改成固定分区:
     .card-title 牌名文字始终由代码生成、始终显示,不再依赖有没有图片(见 CLAUDE.md)。
     【字号历史】曾经是CSS写死font-size:14px(短名基准)+按.trick/.steal类别写死字号
     (4字锦囊类专属),后来改成按牌名字数(4/5字)分档用inline style覆盖——这两版都是
     "手动猜大小",覆盖不到所有长度组合。**这次改成 render.js 的 fitFontSize 用canvas
     文字测量实测自适应**,每次渲染都精确算出这张牌的名字刚好能放进可用宽度的字号,
     不再需要在这里写任何字号(inline style 100%覆盖,CSS 不设font-size,详见 render.js
     的 renderHand)。
     padding 给标题栏两侧留安全边距(--badge尺寸的0.12倍,不是完整让开一整个badge宽度,
     只是让文字不贴着最边缘开始、给视觉留白,避免和角标/问号图标贴得太紧;fitFontSize
     算可用宽度时用的也是这个同一个padding公式,两处必须保持一致,否则算出来的字号会
     和实际渲染的可用空间对不上)。
     overflow:hidden+white-space:nowrap 是最后一道防线(不是主要机制)——fitFontSize
     正常工作时不会触发换行/截断,这两条只是防止极端情况(比如canvas测量因为字体加载
     延迟等原因估算有偏差)时不至于破坏布局。**不再需要 text-overflow:ellipsis**:
     既然 fitFontSize 已经确保文字宽度不超过可用空间,理论上不会触发省略号这条路径。 */
  .card-title{
    flex:0 0 22%;display:flex;align-items:center;justify-content:center;
    font-weight:700;background:rgba(0,0,0,.15);
    border-bottom:1px solid rgba(0,0,0,.15);
    padding:0 calc(var(--badge) * 0.12); overflow:hidden; white-space:nowrap;
  }
  .card-art-box{flex:1 1 auto;position:relative;overflow:hidden;}
  .card-art-box .card-art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  /* 没图时(映射表缺失、或全部候选格式都加载失败)插画区域留一块占位底色,不完全空白,
     也不会露出浏览器原生的"图裂了"破图标(<img>本身已被 cardImgError display:none)。 */
  .card.no-art .card-art-box{background:rgba(0,0,0,.08);}
  /* 角标定位基准/尺寸/视觉样式几经调整,这是最新版本。
     【定位基准的历史】①最初是 .card 的直接子元素、相对整张卡片定位,但没有顶开标题栏
     高度,top:5px 落在标题栏那一行、和牌名文字视觉重叠;②随后挪进 .card-art-box 内部
     改成相对插画区域定位,避开了标题栏,但视觉上角标位置变成跟着插画区域的尺寸走;
     ③改回 .card 的直接子元素、用 top:calc(22%+5px) 顶开标题栏高度;④角标尺寸收敛到
     --badge 变量并调小到 20px 后,重新采用 top:0;left:0,和 .info-badge-hit(同样
     top:0;right:0)严格对齐在同一条水平线,形成真正的左右对角(见下方"尺寸"小节)。
     只保留左上角一个角标,右下角(.corner.br)已删除——单个角标已经能完整传达花色点数
     信息,不需要两处重复;render.js 的 renderHand 也不再生成 .corner.br 这个 div。
     【尺寸】宽高用 var(--badge),字号用 calc(var(--badge) * 0.42)(按比例跟随角标
     尺寸缩放,不再是独立维护的一个数字)——响应式断点只需要覆盖 .card 的 --badge 这
     一个变量,.corner 和 .info-badge-hit 的尺寸/字号会通过 calc() 公式自动重新算出。
     【视觉样式,历史】曾经是半透明圆形徽章(深色径向渐变底+金色细边);随后改成纯文字
     +text-shadow(黑色双层描边阴影)保证在任意插画背景上可读。
     【这次的改动】进一步去掉 text-shadow,回归最纯粹的纯文字——标题栏字号现在已经
     用 canvas 文字测量实测自适应(见 render.js 的 fitFontSize),不再需要靠阴影去
     补偿"字号算不准导致和插画背景冲突"这类问题;纯文字视觉上最轻量,不额外增加任何
     视觉噪音。**如果以后实测发现某些浅色/高对比度插画背景下角标文字确实难以辨认,
     再重新评估要不要加回一层轻量阴影**——这次没有遇到需要加回的实测证据,不要凭空
     加回去。
     **文字颜色的红黑花色区分不受这次改动影响**:角标内容是 cardFace(card)(data.js)生成的
     `<span style="color:...">`,红桃/方块显示红色数字、黑桃/梅花显示黑色数字,inline style
     的优先级天然高于这里 .corner 的 color(#e8d5a8 只是没有具体花色信息时——理论上不会发生,
     cardFace 总是返回带色 span——的兜底文字色),红黑区分逻辑完全保留、不受这次改动
     影响——这是每张牌实例的真实游戏机制信息(如乐不思蜀判定看花色),不能被图片替代
     或省略。 */
  .corner{
    position:absolute; top:0; left:0; z-index:2;
    width:var(--badge); height:var(--badge);
    display:flex; align-items:center; justify-content:center;
    font-size:calc(var(--badge) * 0.42); font-weight:700;
    color:#e8d5a8;
  }
  /* 每种牌型都有和标题文字同色的2px inset描边(+原有2px投影),.sha(杀)不再是唯一带描边
     的牌型——统一视觉风格,五种牌型(杀/桃/闪/普通锦囊/顺手拆桥类)一眼就能通过卡片边框
     颜色分辨类别,不需要盯着标题文字看。 */
  .card.sha{box-shadow:0 0 0 2px var(--cinnabar) inset,0 2px 0 rgba(0,0,0,.3);}
  .card.tao{box-shadow:0 0 0 2px var(--jade) inset,0 2px 0 rgba(0,0,0,.3);}
  .card.tao .card-title{color:var(--jade);}
  .card.shan{box-shadow:0 0 0 2px #2f5b86 inset,0 2px 0 rgba(0,0,0,.3);}
  .card.shan .card-title{color:#2f5b86;}
  .card.trick{box-shadow:0 0 0 2px #7a5fa0 inset,0 2px 0 rgba(0,0,0,.3);}
  /* 锦囊/顺手类牌名字号不再需要在这里单独处理——render.js 的 fitFontSize 对所有牌名
     一视同仁用canvas实测算出合适字号,不分牌型类别,只保留按牌型区分的文字颜色 +
     letter-spacing(轻微收紧字距,辅助长牌名排布,和字号算法不冲突)。 */
  .card.trick .card-title{color:#7a5fa0;letter-spacing:-.02em;}
  .card.steal{box-shadow:0 0 0 2px #1f7a6e inset,0 2px 0 rgba(0,0,0,.3);}
  .card.steal .card-title{color:#1f7a6e;letter-spacing:-.02em;}
  .card.selected{outline:3px solid var(--gold);transform:translateY(-6px);}
  /* 弃牌阶段"多选后统一确认":已勾选待弃置的牌在既有.selected(金色描边+上浮)基础上叠加
     一层半透明朱红遮罩+朱红描边,明确区分"这张要被弃掉"和其它场景下的".selected"(选中
     待使用/待移动等),避免玩家把两种不同含义的"选中态"混淆。 */
  .card.discard-selected{outline-color:var(--cinnabar-bright);box-shadow:inset 0 0 0 999px rgba(216,73,44,.28);}
  .card.disabled{opacity:.4;pointer-events:none;}
  .card.disabled{opacity:.4;pointer-events:none;}
  .cardback{
    width:46px;height:66px;border-radius:8px;
    background:repeating-linear-gradient(45deg,#3a302a,#3a302a 6px,#2c241f 6px,#2c241f 12px);
    border:1px solid var(--line);
  }
  .backs{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
  .backs .cardback{width:20px;height:28px;}

  /* ===== 说明浮层 + "?" 触发角标(手机/电脑通用;查看说明与出牌手势分离,靠 stopPropagation) =====
     这几条基础规则必须放在下面两个 @media 断点之前——同选择器同优先级时 CSS 靠源码顺序决胜负,
     之前误把它们放在断点后面,导致断点里对 .info-badge/.card .info-badge-hit 的所有覆盖全部
     被这里的"无条件"规则重新盖掉,不管断点里写什么尺寸,实际生效的永远是这里的桌面尺寸——
     这是"改了尺寸手机上却看不出变化"的真正原因之一,必须挪到断点之前才能让断点覆盖生效。 */
  .info-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;
    border:1px solid var(--gold);color:var(--gold);font-size:13px;font-weight:700;line-height:1;cursor:pointer;
    background:#1a1410;user-select:none;flex:0 0 auto;}
  /* 手牌卡片上的角标:外层 .info-badge-hit 是绝对定位的实际点击热区(比视觉圆圈大,手指好点中),
     内层 .info-badge 只管视觉圆圈大小——两者分离,断点缩小的是视觉尺寸,不牵连点击热区。
     定位在右上角:左上=花色点数(.corner),右上本身是空的,唯一要注意的是——卡片只有
     46~64px 宽,热区盒子如果还按"越大越好点"做到 32~34px,盒子本身就会顶到卡片将近一半,
     把居中于热区内的视觉圆圈推离真正的右上角、往卡片中线靠,和左上角花色点数重新撞上
     (这正是上一版放右上角失败的原因,不是"位置本身不行",是"热区盒子相对卡片太大,把圆圈
     挤离了角落")。这次视觉圆圈已经缩得很小,热区盒子跟着按各断点等比例收紧、贴着真正的
     右上角,不再让圆圈被推向中间——已用真实渲染测量确认(见 CLAUDE.md)三档宽度下都不重叠。
     热区盒子和 .corner 共用同一个 --badge 尺寸变量(声明在 .card 上):两者本来就该是
     严格对称的左右对角,共用一个变量后不可能出现"一个改了另一个忘了改"这种不对称——
     内层视觉圆圈比热区盒子小 8px(和原来 26px 热区配 18px 圆圈同一个比例关系),字号
     按 --badge 的比例算,不再是独立维护的数字。 */
  .card .info-badge-hit{position:absolute;top:0;right:0;width:var(--badge);height:var(--badge);display:flex;
    align-items:center;justify-content:center;pointer-events:auto;z-index:3;cursor:pointer;}
  .card .info-badge-hit .info-badge{width:calc(var(--badge) - 8px);height:calc(var(--badge) - 8px);font-size:calc(var(--badge) * 0.35);}

  /* ===== 日志 toast:"刚刚发生了什么"的瞬时提示,和 .banner("当前该谁做什么")信息类型不同,
     不共用元素/不共用配色——banner 是朱红(行动焦点),这里用金色(氛围提示,呼应 .phase-pill)。
     position:fixed 独立于文档流,不占位、不推挤座位卡片/按钮。纯 CSS 动画做"淡入-停留-淡出",
     不需要 JS 计时器把它关掉——render.js 只负责在有新日志时重新触发 .show 类。
     pointer-events:none 全程生效,不会挡住点击(哪怕还没淡出完)。
     基础规则必须放在下面两个 @media 断点之前(和上面 info-badge 那次踩过的坑同一条教训),
     否则断点里对 font-size/padding 的覆盖会被这条无条件规则重新盖掉,断点形同虚设。
     定位在正屏幕中央(translate(-50%,-50%) 天然按元素实际渲染尺寸居中,不需要为换行后
     可能变成两行手动算高度):**刻意接受**这会和 .banner/.controls 短暂重叠(决斗/无懈可击
     这类需要看清按钮的场景也不例外)——不做"检测 banner 位置再避让"这类防碰撞工程,原因见
     CLAUDE.md(概括:pointer-events:none 保证不会挡住点击,响应阶段本来就没有超时,等
     ~2.6 秒它自己淡出就行,不构成任何操作损失)。
     max-width 从固定不换行改成允许换行(min(90vw,480px)):90vw 保证任何屏宽下左右都至少
     留 5% 边距,不会贴到屏幕边缘;换行后不再需要 text-overflow 截断,圆角也从纯药丸形的
     999px 收成 16px 的圆角矩形,两行文字撑高后不会显得比例怪异。 */
  #logToast{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    max-width:min(90vw,480px);
    background:#1a1410;border:1px solid var(--gold);color:var(--gold);
    padding:9px 18px;border-radius:16px;font-size:16px;line-height:1.4;text-align:center;
    z-index:60;pointer-events:none;opacity:0;box-shadow:0 2px 6px rgba(0,0,0,.4);
  }
  #logToast span{font-weight:700;} /* 染色的玩家名字额外加粗,配合颜色更好辨认,和座位卡片姓名的粗体呼应 */
  /* 按事件类型(kind)给 toast 强调色:仅改边框/非姓名文字色,姓名仍保留座位色(inline color 优先级更高)。
     未打标签或未定义样式的 kind 保持默认金色。以后新增可弹 kind 时在这里补对应配色即可。 */
  #logToast.toast-damage{border-color:#c0392b;color:#e57368;}
  #logToast.toast-sha{border-color:#d98a3d;color:#e6a664;}
  #logToast.show{animation:logToastFade 2.5s ease forwards;}
  @keyframes logToastFade{
    0%{opacity:0;transform:translate(-50%,calc(-50% + 8px));}
    10%{opacity:1;transform:translate(-50%,-50%);}
    80%{opacity:1;}
    100%{opacity:0;}
  }

  /* ===== "轮到你了"大字提示:语音提示(可能被浏览器自动播放策略拦截而静默失败)的视觉兜底,
     即使听不到声音也能看到。刻意不复用 .banner——.banner 是常驻的"当前该谁做什么"提示条,
     被决斗/技能询问等很多场景复用,改大会影响那些场景;这是独立的、短暂出现自动消失的
     大字覆层,只用于"轮到我了"这一个场景,视觉上比 logToast 更醒目(更大字号、居中、
     短暂遮罩),复用同一套"class 加/减触发 CSS 动画"的实现模式。
     pointer-events:none 全程生效,不会挡住玩家点击下面的操作按钮,哪怕提示还没消失。 */
  .my-turn-banner{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.8);
    font-size:2.2rem; font-weight:700; color:var(--cinnabar-bright);
    background:rgba(20,16,12,0.92); padding:28px 48px; border-radius:16px;
    border:2px solid var(--cinnabar); z-index:9999;
    opacity:0; pointer-events:none; text-align:center;
    transition:opacity .25s ease, transform .25s ease;
  }
  .my-turn-banner.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  @media (max-width:640px){
    .my-turn-banner{font-size:1.6rem;padding:20px 34px;}
  }
  @media (max-width:480px){
    .my-turn-banner{font-size:1.3rem;padding:16px 26px;}
  }

  /* ===== 手机断点(仍是同一套 opp1/opp2 命名区域,只收紧列宽下限/间距/字号,不改结构) ===== */
  @media (max-width:640px){
    .seats{gap:8px;}
    .seats.opp1{grid-template-columns:minmax(120px,1fr);grid-template-rows:auto minmax(36px,72px) auto;}
    .seats.opp2{grid-template-columns:minmax(100px,1fr) minmax(100px,1fr);grid-template-rows:auto minmax(36px,72px) auto;}
    .seat{padding:9px 10px;}
    .seat.me{max-width:100%;padding:12px 14px;}
    /* 窄屏头像框收紧尺寸(仍严格保持3:4比例,不引入裁切)。 */
    .avatar-box{width:72px;height:96px;}
    .seat.me .avatar-box{width:90px;height:120px;}
    .nm{font-size:13px;gap:5px;}
    .seat.me .nm{font-size:14px;}
    .skill-line{font-size:10px;}
    .seat.me .skill-line{font-size:11px;}
    .hp{font-size:14px;letter-spacing:1px;}
    .seat.me .hp{font-size:16px;}
    .meta{font-size:11px;}
    .seat.me .meta{font-size:11.5px;}
    .equip-list{font-size:10px;}
    .seat.me .equip-list{font-size:11px;gap:3px;}
    .dchip{padding:1px 5px;}
    /* 手牌:桌面 64x92 在窄屏上占太多行;缩小卡面本身,flex-wrap(已有,见 .hand)继续兜底
       "无论多少张手牌都不会横向溢出/需要横向滚动"这条硬指标——缩小是为了减少换行数量,
       不是靠它来防溢出(防溢出这件事从一开始就是 flex-wrap 的职责,缩小前后都不会溢出)。 */
    .hand{gap:6px;}
    .card{width:50px;height:74px;--badge:16px;} /* 角标/问号图标统一收窄到16px,.corner
      和 .info-badge-hit 的尺寸/字号靠 calc() 公式自动跟着算,不用再分别写死两套数值。
      .card-title 的字号也不需要在这里覆盖——fitFontSize(render.js)按这一档实际
      的卡片宽度/--badge值实测计算,inline style 100%覆盖,这里写CSS字号也不会生效。 */
    /* 座位卡上的角标(武将技能/装备说明,内联文字流,不覆盖其它内容):适度缩小,不需要热区/
       视觉分离那一套(不是绝对定位盖在别的内容上面,不存在遮挡问题)。这个 .info-badge
       是座位卡专用的、和手牌卡片的 .card .info-badge-hit .info-badge 是两个不同的东西,
       不受 --badge 变量影响,继续独立维护尺寸。 */
    .info-badge{width:20px;height:20px;font-size:12px;}
    #logToast{font-size:15px;padding:8px 16px;}
  }
  /* ===== 极窄手机断点(叠加在上面 640px 断点之上,数值更紧、且改了 opp2 的结构) ===== */
  @media (max-width:480px){
    /* opp2(3人局)两个对手左右分列在极窄屏幕会被挤到装备区/名字都显示不下;
       改成三行纵向堆叠(tl/tr/me 各占一整行),不再是"精确复刻左右两侧"这个第2步的效果,
       但保证每张卡片本身有足够宽度把名字/血条/装备读清楚——这层退化只在极窄屏生效,
       正常手机(640px 断点覆盖的范围)仍然维持左右分列。 */
    .seats.opp2{
      grid-template-columns:minmax(0,1fr);
      grid-template-rows:auto auto minmax(28px,48px) auto;
      grid-template-areas:"tl" "tr" "table" "me";
    }
    .card{width:46px;height:68px;--badge:14px;} /* 再收紧一档,.corner/.info-badge-hit
      跟着 --badge 自动缩小,不用逐处对齐;.card-title 字号同上由 fitFontSize 实测,
      这里不需要再覆盖。 */
    /* 480px是这次风险最大的场景(3人局同屏挤最紧):头像框再收一档,仍严格保持3:4比例。 */
    .avatar-box{width:60px;height:80px;}
    .seat.me .avatar-box{width:72px;height:96px;}
    #logToast{font-size:14px;padding:7px 14px;}
  }

  .err{color:var(--cinnabar-bright);font-size:13px;margin-top:8px;}
  .footnote{color:var(--paper-dim);font-size:11px;text-align:center;margin-top:26px;line-height:1.7;}

  /* 圆形图标按钮统一样式(#helpBtn 与 .info-close 共用):固定尺寸的圆 + flex 居中图形,
     覆盖全局 button 的 padding/line-height,避免字形因内边距不对称而偏移错位。 */
  .icon-btn{padding:0;line-height:1;display:flex;align-items:center;justify-content:center;border-radius:50%;}
  #helpBtn{position:fixed;top:12px;right:12px;z-index:50;width:44px;height:44px;
    border:1px solid var(--gold);background:#1a1410;color:var(--gold);font-size:20px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  /* 日志按钮:和 helpBtn 同款固定圆形图标,挨着放(往左让位),点开复用 showInfo/infoModal 浮层——
     日志默认收起,只留这一个入口,和第4步"banner常驻焦点 + 完整历史收进可展开面板"的设计一致。 */
  #logBtn{position:fixed;top:12px;right:64px;z-index:50;width:44px;height:44px;
    border:1px solid var(--gold);background:#1a1410;color:var(--gold);font-size:19px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  /* 常驻"关闭房间"入口(cleanupRoom):不管游戏处于什么阶段都可见,固定挂在页面角落、不随
     render(g)重绘变化。放左上角(而不是和 #helpBtn/#logBtn 同一个右上角)——避开已有的圆形
     图标按钮堆叠,同时这个按钮本身是"危险操作"入口,和"帮助/日志"这类常规查看类按钮分开
     放置,视觉上不容易被误认成同一组功能、也不容易被手误连续点错。
     【真机踩过的坑】最初做成文字按钮("关闭房间"四个字,自适应宽度),在375px这类窄屏下
     实测(Playwright量bounding box,不是只凭肉眼截图判断)发现文字按钮宽达74px,右边缘
     (x=83.8)确实穿进了标题里"杀"字印章图标(h1 .seal,x从63.15起)的范围,是真实的视觉
     重叠,不是误报。改成和 #helpBtn/#logBtn 同款的44x44圆形图标按钮(用🚪表示"离开/关闭
     房间"这个语义,title属性保留完整文字说明给屏幕阅读器/鼠标悬停提示),右边缘固定在
     x=56,比标题印章图标的起始位置(x=63.15)更靠左,不会有任何重叠——图标按钮的固定尺寸
     比文字按钮的"按内容自适应宽度"更容易通过量出来的具体数值保证不越界。 */
  #closeRoomBtn{position:fixed;top:12px;left:12px;z-index:100;width:44px;height:44px;
    border:1px solid var(--cinnabar-bright);background:#1a1410;color:var(--cinnabar-bright);
    font-size:20px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .log-modal{max-height:60vh;overflow:auto;font-size:13px;color:var(--paper-dim);text-align:left;}
  .log-modal div{padding:2px 0;}
  .log-modal div:last-child{color:var(--paper);}
  /* 常驻日志小面板:嵌在 controls 下方的正常文档流里,不用 fixed 定位——手机窄屏下固定定位
     容易和其它元素重叠(#closeRoomBtn 那次真机踩过的坑),这里刻意避开同类问题。只展示最近
     几条(renderLogPanel 控制条数),完整历史仍走 📜 按钮的弹窗。 */
  .log-panel{max-height:132px;overflow-y:auto;text-align:left;font-size:13px;line-height:1.6;
    color:var(--paper-dim);background:rgba(0,0,0,.18);border:1px solid var(--line);
    border-radius:10px;padding:8px 10px;margin-top:10px;}
  .log-panel div{padding:2px 0;}
  .log-panel div:last-child{color:var(--paper);}
  /* 宽屏(>=900px,手机断点之外)下把常驻日志面板切到右侧,不再挤在 controls 下方——
     窄屏没有侧边空间，保持原来嵌入 controls 下方的位置不变，只在这里加宽屏覆盖。
     top:64px 避开顶部 44px 高的 helpBtn/logBtn/closeRoomBtn(它们在 top:12px，
     底边约在 56px)，留出安全间距；宽度/最大高度按侧栏尺寸给，允许自行微调数值，
     但必须保持 position:fixed 只出现在这条宽屏媒体查询内、不影响窄屏默认布局。 */
  @media (min-width:900px){
    .log-panel{position:fixed;top:64px;right:12px;width:260px;
      max-height:calc(100vh - 90px);margin-top:0;z-index:40;}
  }
  #infoModal{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.62);padding:16px;}
  #infoModal.hidden{display:none;}
  .info-panel{background:#221a14;border:1px solid var(--gold);border-radius:12px;max-width:560px;width:100%;
    max-height:82vh;overflow:auto;padding:18px 18px 22px;position:relative;color:var(--paper);}
  .info-panel h3{color:var(--gold);margin:0 0 10px;font-size:20px;padding-right:36px;}
  .info-panel .info-body{font-size:16px;line-height:1.65;}
  .info-panel .info-close{position:absolute;top:10px;right:12px;width:36px;height:36px;
    border:1px solid var(--line);background:transparent;color:var(--paper);font-size:18px;cursor:pointer;}
  .info-panel .sec{margin:16px 0 6px;color:var(--gold);font-weight:700;font-size:16px;border-bottom:1px solid var(--line);padding-bottom:4px;}
  .info-panel .item{margin:9px 0;font-size:15px;line-height:1.55;}
  .info-panel .item b{color:var(--gold);}
  a{color:var(--gold);}
  /* 出牌确认弹窗:独立于 #infoModal,语义是"确定/取消"而非"关闭",不复用 info-panel 的按钮结构。 */
  #confirmModal{position:fixed;inset:0;z-index:110;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.62);padding:16px;}
  #confirmModal.hidden{display:none;}
  .confirm-panel{background:#221a14;border:1px solid var(--gold);border-radius:12px;max-width:420px;width:100%;
    padding:20px 18px;color:var(--paper);}
  .confirm-panel .confirm-msg{font-size:17px;line-height:1.6;margin-bottom:16px;text-align:center;}
  .confirm-panel .confirm-btns{display:flex;gap:10px;justify-content:center;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<!-- 说明浮层与帮助按钮:独立于 render 重建的容器,实时刷新不会关掉/清空 -->
<button id="helpBtn" class="icon-btn" title="规则 / 说明" onclick="showHelp()">?</button>
<button id="logBtn" class="icon-btn" title="查看完整日志" onclick="showLog()">📜</button>
<button id="closeRoomBtn" class="icon-btn" title="关闭房间:删除本房间数据,所有人回到大厅">🚪</button>
<div id="logToast"></div>
<div id="myTurnBanner" class="my-turn-banner"></div>
<div id="infoModal" class="hidden"></div>
<div id="confirmModal" class="hidden"></div>
<div class="wrap">
  <h1><span class="seal">杀</span>极简三国杀</h1>
  <div class="sub">三 人 联 机 · 第 一 版</div>

  <!-- ============ CONFIG WARNING ============ -->
  <div id="configWarn" class="panel hidden" style="border-color:var(--cinnabar)">
    <b style="color:var(--cinnabar-bright)">还没填 Firebase 配置</b><br>
    <span style="font-size:13px;color:var(--paper-dim)">
      打开本文件,把顶部 <code>firebaseConfig</code> 换成你自己 Firebase 项目的配置,再部署。详见底部说明。
    </span>
  </div>

  <!-- ============ LOBBY ============ -->
  <div id="lobby" class="panel">
    <div class="row">
      <div>
        <label>房间号(三人填同一个)</label>
        <input id="roomInput" placeholder="例如 chibi" value="chibi">
      </div>
      <div>
        <label>你的名字</label>
        <input id="nameInput" placeholder="例如 玄德">
      </div>
      <div style="flex:0 0 auto">
        <button class="primary" id="joinBtn">进入房间</button>
      </div>
    </div>
    <div id="lobbyErr" class="err"></div>
  </div>

  <!-- ============ GAME ============ -->
  <div id="game" class="hidden">
    <div class="seats" id="seats"></div>

    <div class="panel table">
      <div class="phase-pill" id="phasePill">等待开始</div>
      <div class="deckinfo" id="deckInfo"></div>
      <div id="banner"></div>
      <div class="controls" id="controls"></div>
      <div class="log-panel" id="logPanel"></div>
    </div>

    <div class="hand-label" id="myGeneral"></div>
    <div class="hand-label">你的手牌</div>
    <div class="hand" id="hand"></div>
  </div>

  <div class="footnote">
    部署后,三人各自打开同一网址、填同一房间号即可。<br>
    手牌只在你自己界面显示牌面;这是给朋友玩的轻量版,并非加密隐藏。
  </div>
</div>

<!-- ?v= 后面的版本号是手动维护的 cache-busting 参数:每次改动 config/data/game/render.js
     (或 index.html 里的 <style>/内联脚本)时都要顺手把这个数字改掉(改动原则见 CLAUDE.md)——
     手机浏览器对静态资源的缓存比电脑顽固得多,即使用户在自己那端硬刷新/关闭重开 App 也未必
     清得掉,查询参数不同=浏览器眼里是"新的" URL,必定重新请求,不依赖用户那侧的缓存策略。 -->
<script src="config.js?v=100"></script>
<script src="data.js?v=100"></script>
<script src="game.js?v=100"></script>
<script src="render.js?v=100"></script>
</body>
</html>
